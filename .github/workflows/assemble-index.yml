name: Assemble Index

# Rebuild the channel index from existing GitHub Releases and redeploy
# GitHub Pages, without triggering any package build. Runs manually
# (e.g. after deleting/restoring a release) and automatically on pushes
# to main that change the site assets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'site/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  assemble-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install channel tooling
        run: pip install ./tools

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -m mip_channel_tools assemble-index

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
