name: Build Package
run-name: "${{ inputs.package_path }} (${{ inputs.architecture }})${{ inputs.force && ' [force]' || '' }}"

# Thin caller. The whole per-(package, architecture) build pipeline lives in the
# reusable workflow in mip-org/mip_channel_tools; this file only defines the
# dispatch interface and delegates to it. Edit the `@ref` on the `uses:` line
# below to build against a different tooling branch.

on:
  workflow_dispatch:
    inputs:
      package_path:
        description: 'Release dir, e.g. packages/with_test/1.0.0'
        required: true
        type: string
      architecture:
        description: 'Target architecture'
        required: true
        type: choice
        options:
          - any
          - linux_x86_64
          - macos_arm64
          - windows_x86_64
          - numbl_wasm
      force:
        description: 'Rebuild even if already published'
        type: boolean
        default: false
      source_repo:
        description: 'Foreign repo to take packages/ from (submission test builds), e.g. owner/mip-staging'
        type: string
        default: ''
      upload:
        description: 'Publish the built .mhl as a release + reindex'
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-package:
    uses: mip-org/mip_channel_tools/.github/workflows/build-package.yml@main
    with:
      package_path: ${{ inputs.package_path }}
      architecture: ${{ inputs.architecture }}
      force: ${{ inputs.force }}
      source_repo: ${{ inputs.source_repo }}
      upload: ${{ inputs.upload }}
    secrets: inherit
