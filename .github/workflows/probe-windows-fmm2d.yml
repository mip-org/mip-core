name: Probe Windows fmm2d

# TEMPORARY investigation workflow (manual only). Used to figure out how to
# build the fmm2d Fortran/C MATLAB MEX on Windows. Not part of the channel
# pipeline; delete once windows_x86_64 support lands in build-package.yml.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Probe stage'
        type: choice
        default: discover
        options:
          - discover
          - build

permissions:
  contents: read

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Discover Fortran/C toolchains
        shell: bash
        run: |
          set +e
          echo "===== runner os ====="; cmd //c ver
          echo; echo "===== PATH entries ====="; echo "$PATH" | tr ':' '\n'
          echo; echo "===== which -a (each tool) ====="
          for t in gfortran gcc g++ make mingw32-make ar cmake perl; do
            echo "## $t"; which -a "$t" 2>/dev/null
          done
          echo; echo "===== versions on PATH ====="
          echo "## gfortran"; gfortran --version 2>/dev/null | head -1
          echo "## gcc";      gcc --version 2>/dev/null | head -1
          echo "## make";     make --version 2>/dev/null | head -1
          echo; echo "===== candidate toolchain dirs ====="
          for d in \
            /c/msys64/mingw64/bin /c/msys64/ucrt64/bin /c/msys64/clang64/bin \
            /c/ProgramData/mingw64/mingw64/bin /c/ProgramData/chocolatey/bin \
            /c/Strawberry/c/bin /c/mingw64/bin /c/tools/mingw64/bin; do
            echo "## $d"; ls "$d"/gfortran* "$d"/mingw32-make* "$d"/gcc* 2>/dev/null
          done
          echo; echo "===== gfortran version at each candidate ====="
          for g in \
            /c/msys64/mingw64/bin/gfortran /c/msys64/ucrt64/bin/gfortran \
            /c/ProgramData/mingw64/mingw64/bin/gfortran /c/Strawberry/c/bin/gfortran \
            /c/mingw64/bin/gfortran; do
            if [ -x "$g" ]; then echo "## $g"; "$g" --version | head -1; "$g" -print-file-name=libgfortran.a; fi
          done
          echo; echo "===== msys64 layout ====="; ls /c/msys64 2>/dev/null
          echo; echo "===== Strawberry layout ====="; ls /c/Strawberry/c/bin 2>/dev/null | grep -iE 'fortran|gcc|make|^ar' | head
          echo; echo "DONE"
