name: Probe Windows fmm2d

# TEMPORARY investigation workflow (manual only). Used to figure out how to
# build the fmm2d Fortran/C MATLAB MEX on Windows. Not part of the channel
# pipeline; delete once windows_x86_64 support lands in build-package.yml.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Probe stage'
        type: choice
        default: lib
        options:
          - discover
          - lib
          - mex

permissions:
  contents: read

env:
  MINGW: /c/mingw64          # GCC 15.2.0, has static libgfortran.a
  FMM_REPO: https://github.com/magland/fmm2d_c_translation

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Discover Fortran/C toolchains
        if: inputs.stage == 'discover'
        shell: bash
        run: |
          set +e
          for t in gfortran gcc g++ make mingw32-make ar; do echo "## $t"; which -a "$t"; done
          echo "## versions"; gfortran --version | head -1; gcc --version | head -1
          for g in /c/mingw64/bin/gfortran /c/Strawberry/c/bin/gfortran; do
            echo "## $g"; "$g" --version | head -1; "$g" -print-file-name=libgfortran.a
          done

      # ---- Stage: build the Fortran/C static library (no MATLAB needed) ----
      - name: Build static lib (mingw gfortran 15)
        if: inputs.stage == 'lib' || inputs.stage == 'mex'
        shell: bash
        run: |
          set -e
          export PATH="$MINGW/bin:$PATH"
          echo "gfortran: $(which gfortran)"; gfortran --version | head -1
          git clone --depth 1 "$FMM_REPO" src
          cd src
          cat > make.inc <<'EOF'
          CC=gcc
          CXX=g++
          FC=gfortran
          FFLAGS=-O3 -funroll-loops -std=legacy -fallow-argument-mismatch -w
          CFLAGS=-O3 -funroll-loops -w
          OMPFLAGS=-fopenmp
          OMPLIBS=-lgomp
          EOF
          echo "===== make.inc ====="; cat make.inc
          echo "===== building lib-static/libfmm2d.a ====="
          mingw32-make libfmm2d.a 2>&1 | tail -80
          echo "===== result ====="
          ls -la lib-static/ 2>/dev/null
          ar t lib-static/libfmm2d.a 2>/dev/null | head -5
          echo "object count: $(ar t lib-static/libfmm2d.a 2>/dev/null | wc -l)"

      - name: Upload static lib
        if: always() && (inputs.stage == 'lib' || inputs.stage == 'mex')
        uses: actions/upload-artifact@v4
        with:
          name: fmm2d-static-lib
          path: |
            src/lib-static/*.a
            src/make.inc
          if-no-files-found: warn
