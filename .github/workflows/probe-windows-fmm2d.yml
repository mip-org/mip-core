name: Probe Windows fmm2d

# TEMPORARY investigation workflow (manual only). Used to figure out how to
# build the fmm2d Fortran/C MATLAB MEX on Windows. Not part of the channel
# pipeline; delete once windows_x86_64 support lands in build-package.yml.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Probe stage'
        type: choice
        default: mextest
        options:
          - discover
          - lib
          - mex
          - mextest

permissions:
  contents: read

env:
  MINGW: /c/mingw64          # GCC 15.2.0, has static libgfortran.a
  FMM_REPO: https://github.com/magland/fmm2d_c_translation

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Discover Fortran/C toolchains
        if: inputs.stage == 'discover'
        shell: bash
        run: |
          set +e
          for t in gfortran gcc g++ make mingw32-make ar; do echo "## $t"; which -a "$t"; done
          for g in /c/mingw64/bin/gfortran /c/Strawberry/c/bin/gfortran; do
            echo "## $g"; "$g" --version | head -1; "$g" -print-file-name=libgfortran.a
          done

      # ---- Build the Fortran/C static library (no MATLAB needed) ----
      - name: Build static lib (mingw gfortran 15)
        if: inputs.stage != 'discover'
        shell: bash
        run: |
          set -e
          export PATH="$MINGW/bin:$PATH"
          gfortran --version | head -1
          git clone --depth 1 "$FMM_REPO" src
          cd src
          cat > make.inc <<'EOF'
          CC=gcc
          CXX=g++
          FC=gfortran
          FFLAGS=-O3 -funroll-loops -std=legacy -fallow-argument-mismatch -w
          CFLAGS=-O3 -funroll-loops -w
          OMPFLAGS=-fopenmp
          OMPLIBS=-lgomp
          EOF
          mingw32-make libfmm2d.a 2>&1 | tail -10
          ls -la lib-static/libfmm2d.a

      # ---- Link the MEX with MATLAB + MinGW ----
      - name: Set up MATLAB
        if: inputs.stage == 'mex' || inputs.stage == 'mextest'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
          release: latest

      - name: Write mex script
        if: inputs.stage == 'mex' || inputs.stage == 'mextest'
        shell: bash
        run: |
          cat > probe_mex.m <<'EOF'
          fprintf('matlabroot=%s ver=%s\n', matlabroot, version);
          setenv('MW_MINGW64_LOC','C:\mingw64');
          xml = fullfile(matlabroot,'bin','win64','mexopts','mingw64.xml');
          assert(isfile(xml), 'mingw64.xml not found');
          [~,fdir] = system('C:\mingw64\bin\gfortran -print-file-name=libgfortran.a');
          fdir = fileparts(strtrim(fdir));
          mex('-f', xml, '-compatibleArrayDims','-DMWF77_UNDERSCORE1','-D_OPENMP', ...
              'src/matlab/fmm2d.c','src/lib-static/libfmm2d.a', ...
              ['-L' fdir],'-lgfortran','-lquadmath','-lgomp', ...
              '-outdir','src/matlab','-output','fmm2d');
          assert(isfile('src/matlab/fmm2d.mexw64'), 'no mexw64 produced');
          d = dir('src/matlab/fmm2d.mexw64');
          fprintf('MEX OK: %d bytes\n', d.bytes);
          EOF

      - name: Build mex
        if: inputs.stage == 'mex' || inputs.stage == 'mextest'
        env:
          MW_MINGW64_LOC: C:\mingw64
        uses: matlab-actions/run-command@v2
        with:
          command: "probe_mex"

      # ---- Prove self-containment: list deps, strip toolchains, run tests ----
      - name: List MEX DLL dependencies
        if: inputs.stage == 'mextest'
        shell: bash
        run: |
          export PATH="$MINGW/bin:$PATH"
          echo "=== DLL imports of fmm2d.mexw64 ==="
          objdump -p src/matlab/fmm2d.mexw64 | grep -i "DLL Name" | sort -u
          echo "=== flagging any mingw runtime DLLs (should be NONE if static) ==="
          objdump -p src/matlab/fmm2d.mexw64 | grep -iE "libgfortran|libgcc|libquadmath|libgomp|libwinpthread|libstdc" && echo "!! NOT self-contained" || echo "OK: no mingw runtime DLL imports"

      - name: Strip MinGW/Strawberry (simulate channel test env)
        if: inputs.stage == 'mextest'
        shell: pwsh
        run: |
          foreach ($p in 'C:\mingw64','C:\Strawberry','C:\msys64','C:\Program Files\Git\mingw64') {
            if (Test-Path $p) { Rename-Item $p "$p.deleted" -ErrorAction SilentlyContinue; Write-Host "renamed $p" }
          }

      - name: Run fmm2d tests without MinGW present
        if: inputs.stage == 'mextest'
        uses: matlab-actions/run-command@v2
        with:
          command: "cd('src/matlab'); try; cfmm2dTest; lfmm2dTest; rfmm2dTest; hfmm2dTest; disp('ALL_FMM2D_TESTS_OK'); catch e; disp(getReport(e)); exit(1); end"

      - name: Upload mex
        if: always() && (inputs.stage == 'mex' || inputs.stage == 'mextest')
        uses: actions/upload-artifact@v4
        with:
          name: fmm2d-mexw64
          path: src/matlab/fmm2d.mexw64
          if-no-files-found: warn
