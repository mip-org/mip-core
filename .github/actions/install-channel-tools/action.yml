name: Install channel tooling
description: >
  Install the mip-channel-tools package (the mip-channel CLI the workflows
  call) from its own repo, mip-org/mip_channel_tools. Single source of truth
  for the repo URL and the installed ref so individual workflows don't repeat
  it. Requires the channel repo to be checked out first (this is a local
  action). The repo is also checked out, so `python -m mip_channel_tools <sub>`
  runs against the channel tree.
inputs:
  ref:
    description: >
      Git ref (tag, branch, or SHA) of mip-org/mip_channel_tools to install.
      Edit the default below to point every workflow at a different branch
      while developing the tooling; a single workflow can override it by
      passing `with: ref: <ref>`.
    required: false
    default: main
runs:
  using: composite
  steps:
    - name: pip install mip-channel-tools
      shell: bash
      env:
        REPO: https://github.com/mip-org/mip_channel_tools.git
        REF: ${{ inputs.ref }}
      # `python -m pip`, not bare `pip`: setup-python's pip wrapper bakes the
      # host tool-cache path into its shebang, so bare `pip` fails with "bad
      # interpreter" in the ubi8 build container (where `python` is the
      # toolchain python3.9). Workflows likewise invoke the CLI as
      # `python -m mip_channel_tools <sub>` so it never depends on a
      # console-script shebang.
      run: python -m pip install "git+${REPO}@${REF}"
