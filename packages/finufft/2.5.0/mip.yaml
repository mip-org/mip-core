name: finufft
description: "FINUFFT nonuniform FFT"
version: "2.5.0"
license: "Apache-2.0"
homepage: "https://finufft.readthedocs.io"
repository: "https://github.com/flatironinstitute/finufft"
dependencies: []

symbol_extensions: [".m", ".js"]

# matlab/  — upstream finufft_plan.m, finufft1d1.m, etc.
# matlab/numbl — single finufft.js builtin + finufft.{wasm,so} that the
# upstream m-files dispatch through.  No m-file overrides here.
paths:
  - path: "matlab"
  - path: "matlab/numbl"

builds:
  - architectures: [linux_x86_64, macos_x86_64, macos_arm64, windows_x86_64]
    compile_script: compile.m
    test_script: test_finufft.m
    paths:
      - path: "matlab"
  - architectures: [numbl_wasm]
    compile_script: compile_numbl_wasm.m
    test_script: test_finufft.m
  - architectures: [numbl_linux_x86_64]
    compile_script: compile_numbl_native.m
    test_script: test_finufft.m
  - architectures: [numbl_macos_x86_64]
    compile_script: compile_numbl_native.m
    test_script: test_finufft.m
