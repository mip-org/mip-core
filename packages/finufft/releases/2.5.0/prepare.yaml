name: finufft
description: "FINUFFT nonuniform FFT via WebAssembly"
version: "2.5.0"
dependencies: []
homepage: "https://finufft.readthedocs.io"
repository: "https://github.com/magland/finufft_mip"
license: "Apache-2.0"

defaults:
  release_number: 5
  symbol_extensions: [".m", ".js"]
  prepare:
    - clone_git:
        url: "https://github.com/magland/finufft"
        subdirectory: "matlab"
        destination: "finufft_matlab"
    - clone_git:
        url: "https://github.com/magland/finufft"
        destination: "finufft_src"
      build_only: true
  addpaths:
    # It's very important that the numbl directory is added first
    - path: "finufft_matlab/numbl"
    - path: "finufft_matlab"

builds:
  - architectures: [numbl_wasm]
    build_script: finufft_matlab/numbl/build_wasm.sh
    build_env:
      FINUFFT_SRC: finufft_src
