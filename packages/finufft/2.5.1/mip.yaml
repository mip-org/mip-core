name: finufft
description: "FINUFFT: fast, parallel nonuniform fast Fourier transforms (types 1, 2, 3 in 1D/2D/3D)."
version: "2.5.1"
license: "Apache-2.0"
homepage: "https://finufft.readthedocs.io"
repository: "https://github.com/flatironinstitute/finufft"
dependencies: []

# matlab/ holds the upstream m-file wrappers (finufft1d1.m, finufft_plan.m, ...)
# and the compiled finufft MEX produced by compile.m.
paths:
  - path: "matlab"

builds:
  - architectures: [linux_x86_64, macos_arm64]
    compile_script: compile.m
    test_script: test_finufft.m
    setup:
      # cmake is not present on the Linux (ubi8) builder; macOS already ships it.
      linux:
        - "dnf install -y cmake"
      # compile.m uses FFTW (not DUCC0) on macOS arm64 to avoid the Apple
      # Clang ducc0 template crash.
      macos:
        - "brew install fftw"
  # Linux x86-64 microarchitecture (SIMD) levels. Same compile.m, which reads
  # BUILD_ARCHITECTURE and pins -march to the level (v2/v3/v4); the base
  # linux_x86_64 build above is the portable SSE2 floor. The client installs
  # the highest level the user's CPU supports. v4 (AVX-512) is built but its
  # runtime test is skipped on runners lacking AVX-512 (see build-package.yml).
  - architectures: [linux_x86_64_v2, linux_x86_64_v3, linux_x86_64_v4]
    compile_script: compile.m
    test_script: test_finufft.m
    setup:
      linux:
        - "dnf install -y cmake"
  # Windows uses MSVC for mex (MinGW miscompiles finufft). compile_windows.m
  # builds the static lib + mex with MSVC and the dependency-free DUCC0 backend.
  - architectures: [windows_x86_64]
    compile_script: compile_windows.m
    test_script: test_finufft.m
  # Windows SIMD levels: v3 (/arch:AVX2) and v4 (/arch:AVX512). MSVC's /arch:
  # can't target psABI v2 distinctly, so the windows_x86_64 build above is the
  # SSE2 baseline and only v3/v4 are added here.
  - architectures: [windows_x86_64_v3, windows_x86_64_v4]
    compile_script: compile_windows.m
    test_script: test_finufft.m
