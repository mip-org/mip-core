name: jigsaw_matlab
description: "JIGSAW: a Delaunay-based unstructured mesh generator (2D/3D/surface) — MATLAB interface and bundled C++ backend."
version:
license: "Custom (see LICENSE.md)"
homepage: "https://github.com/dengwirda/jigsaw-matlab"
repository: "https://github.com/dengwirda/jigsaw-matlab"
dependencies: []

# Mirrors initjig.m, which adds tools/ and parse/ (recursively) to the path.
# The compiled backend lives under external/jigsaw/bin (built by compile.m).
paths:
  - path: "."
  - path: tools
    recursive: true
  - path: parse
    recursive: true

builds:
  - architectures: [linux_x86_64, macos_arm64, windows_x86_64]
    compile_script: compile.m
    test_script: test_jigsaw_matlab_channel.m
    setup:
      # cmake is not present on the Linux (ubi8) builder; macOS and
      # windows-latest already ship it.
      linux:
        - "dnf install -y cmake"
