name: jigsaw_matlab
description: "JIGSAW: a Delaunay-based unstructured mesh generator (2D/3D/surface) — MATLAB interface and bundled C++ backend."
version:
license: "Custom (see LICENSE.md)"
homepage: "https://github.com/dengwirda/jigsaw-matlab"
repository: "https://github.com/dengwirda/jigsaw-matlab"
dependencies: []

# Mirrors initjig.m, which adds tools/ and parse/ (recursively) to the path.
# numbl/ carries the numbl_wasm port (jigsaw/tripod/marche/initjig .m overrides
# + the jigsaw_kernel.numbl.js builtin and jigsaw.wasm). It is listed LAST so
# its .m overrides win the first-on-path name resolution on numbl; the native
# builds override `paths` below to exclude it.
paths:
  - path: "."
  - path: tools
    recursive: true
  - path: parse
    recursive: true
  - path: numbl

builds:
  # Native: JIGSAW's backend is a set of standalone C++ executables driven over
  # files via system(). Exclude numbl/ so the upstream jigsaw.m/tripod.m/
  # marche.m (which shell out) are used.
  - architectures: [linux_x86_64, macos_arm64, windows_x86_64]
    compile_script: compile.m
    test_script: test_jigsaw_matlab_channel.m
    paths:
      - path: "."
      - path: tools
        recursive: true
      - path: parse
        recursive: true
    setup:
      # cmake is not present on the Linux (ubi8) builder; macOS and
      # windows-latest already ship it.
      linux:
        - "dnf install -y cmake"

  # numbl WASM: numbl supports neither system() nor file access from a builtin,
  # so the executable/file protocol can't be reused. Instead JIGSAW's in-memory
  # C library (lib_jigsaw) is compiled to a standalone jigsaw.wasm (emcc) and
  # driven through its struct API by jigsaw_kernel.numbl.js; the numbl/ .m
  # overrides keep the file-based OPTS contract (loadmsh in, savemsh out). emcc
  # is provided by the channel's numbl_wasm toolchain, so no extra setup.
  - architectures: [numbl_wasm]
    compile_script: compile_numbl_wasm.m
    test_script: test_jigsaw_numbl_wasm.m
