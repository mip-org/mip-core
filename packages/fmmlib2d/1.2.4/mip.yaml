name: fmmlib2d
description: "Helmholtz and Laplace FMM library in R^2 (Fortran, Greengard & Gimbutas)."
version: "1.2.4"
license: "BSD-3-Clause"
homepage: "https://github.com/zgimbutas/fmmlib2d"
repository: "https://github.com/zgimbutas/fmmlib2d"
dependencies: []

paths:
  - path: "matlab"

builds:
  - architectures: [linux_x86_64, macos_arm64]
    compile_script: compile.m
    test_script: test_fmmlib2d.m
  - architectures: [windows_x86_64]
    compile_script: compile_windows.m
    test_script: test_fmmlib2d.m
