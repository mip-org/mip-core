name: sc_toolbox
description: "Schwarz-Christoffel Toolbox: conformal maps of the unit disk / half-plane / strip onto polygonal regions."
version: "3.1.3"
license: "BSD-3-Clause"
homepage: "https://tobydriscoll.net/project/sc-toolbox/"
repository: "https://github.com/tobydriscoll/sc-toolbox"
dependencies: []

# All functions live at the toolbox root: the @-class folders (@polygon,
# @diskmap, @scmap, ...) and the +sctool package resolve from the root being
# on the path, which is the whole install.
paths:
  - path: "."

builds:
  - architectures: [any]
    test_script: test_sc_toolbox_channel.m
