name: fmm2d
description: "Flatiron Institute Fast Multipole Methods in 2D"
version: main
license: "Apache-2.0"
homepage: "https://github.com/flatironinstitute/fmm2d"
repository: "https://github.com/flatironinstitute/fmm2d"
dependencies: []

addpaths:
  - path: "matlab"
  # matlab/numbl comes after matlab so the rfmm2d.m override takes priority
  - path: "matlab/numbl"

builds:
  - architectures: [linux_x86_64, macos_x86_64, macos_arm64]
    release_number: 101
    compile_script: compile.m
    test_script: test_fmm2d.m
    addpaths:
      - path: "matlab"
  - architectures: [numbl_wasm]
    release_number: 1
    compile_script: compile_numbl_wasm.m
    test_script: test_fmm2d.m
  - architectures: [numbl_linux_x86_64]
    release_number: 2
    compile_script: compile_numbl_native.m
    test_script: test_fmm2d.m
  - architectures: [numbl_macos_x86_64]
    release_number: 2
    compile_script: compile_numbl_native.m
    test_script: test_fmm2d.m
