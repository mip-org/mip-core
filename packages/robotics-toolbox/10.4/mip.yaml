name: robotics-toolbox
description: "Robotics Toolbox for MATLAB: serial-link manipulator kinematics, dynamics, trajectories and mobile robotics (Peter Corke)."
version: "10.4"
license: "LGPL-2.1"
homepage: "https://petercorke.com/toolboxes/robotics-toolbox/"
repository: "https://github.com/petercorke/robotics-toolbox-matlab"
dependencies: [spatial-math-toolbox]

# Root holds the @SerialLink/@CodeGenerator classes and top-level functions;
# models/ has the robot models and data/ the associated data files.
paths:
  - path: "."
  - path: "models"
  - path: "data"

# Opt in with `mip load robotics-toolbox --with <group>`.
extra_paths:
  examples:
    - path: "demos"
    - path: "examples"
    - path: "Apps"
  tests:
    - path: "test"

builds:
  - architectures: [any]
    test_script: test_robotics_toolbox.m
