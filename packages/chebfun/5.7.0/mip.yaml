name: chebfun
description: "Chebfun is an open-source software system for numerical computing with functions."
version: "5.7.0"
license: "BSD-3-Clause"
homepage: "https://github.com/chebfun/chebfun"
repository: "https://github.com/chebfun/chebfun"
dependencies: []

paths:
  - path: "."

# Upstream tests/ ships in the bundle but is off-path by default; opt in with
# `mip load chebfun --with tests`. Recursive: the suite is organised into
# per-class subdirectories (tests/adchebfun, ...).
extra_paths:
  tests:
    - path: "tests"
      recursive: true

builds:
  - architectures: [any]
    test_script: test_chebfun.m
