name: sedumi
description: "SeDuMi: Self-Dual-Minimization — optimization over linear, second-order, rotated quadratic, and semidefinite cones."
version: "1.3.8"
license: "GPL-2.0"
homepage: "https://sedumi.ie.lehigh.edu/"
repository: "https://github.com/sqlp/sedumi"
dependencies: []

paths:
  - path: "."
  - path: "conversion"

extra_paths:
  examples:
    - path: "examples"

builds:
  - architectures: [linux_x86_64, macos_arm64, windows_x86_64]
    compile_script: compile.m
    test_script: test_sedumi_channel.m
