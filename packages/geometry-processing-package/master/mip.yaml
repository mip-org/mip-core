name: geometry-processing-package
description: "Geometry Processing Package: MATLAB tools for triangle meshes — I/O, discrete operators (Laplace-Beltrami, gradient), topology, and parameterization."
version:
license: "MIT"
homepage: "https://github.com/cfwen/geometry-processing-package"
repository: "https://github.com/cfwen/geometry-processing-package"
dependencies: []

# Functions live in topical subdirectories (algebra/io/topology/...); add all.
paths:
  - path: "."
    recursive: true

builds:
  - architectures: [any]
    test_script: test_geometry_processing_package.m
