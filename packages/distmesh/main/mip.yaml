name: distmesh
description: "DistMesh: a simple MATLAB mesh generator for unstructured triangular and tetrahedral meshes (Persson & Strang)."
version:
license: "MIT"
homepage: "https://persson.berkeley.edu/distmesh/"
repository: "https://github.com/popersson/DistMesh"
dependencies: []

# Mirrors startup.m, which adds src/ (the toolbox functions) and examples/.
paths:
  - path: src

# Opt in with `mip load distmesh --with <group>`.
extra_paths:
  examples:
    - path: examples
  tests:
    - path: tests

builds:
  - architectures: [any]
    test_script: test_distmesh.m
